apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wanderblogg-hpa
  namespace: attendance-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wanderblogg
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 1
        periodSeconds: 30
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 1
        periodSeconds: 30
